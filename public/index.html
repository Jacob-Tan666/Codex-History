<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex History</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="会话筛选">
        <div class="brand-block">
          <div class="brand-mark">CH</div>
          <div>
            <h1>Codex History</h1>
            <p>本机对话历史控制台</p>
          </div>
        </div>

        <div class="stats-grid" aria-label="统计">
          <div class="stat">
            <span id="totalCount">0</span>
            <small>全部</small>
          </div>
          <div class="stat">
            <span id="visibleCount">0</span>
            <small>当前</small>
          </div>
        </div>

        <label class="field-label" for="searchInput">搜索</label>
        <div class="search-box">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
          </svg>
          <input id="searchInput" type="search" placeholder="标题、sessionId、路径" autocomplete="off" />
        </div>

        <label class="field-label">来源</label>
        <div class="segmented" role="tablist" aria-label="来源">
          <button class="is-active" data-source="all" type="button">全部</button>
          <button data-source="sessions" type="button">活跃</button>
          <button data-source="archived" type="button">归档</button>
        </div>

        <div class="limit-row">
          <label for="limitInput">加载数量</label>
          <input id="limitInput" type="number" min="1" max="1000" value="200" />
        </div>

        <button id="refreshButton" class="primary-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.3 6.36M3 12A9 9 0 0 1 18.3 5.64M21 5v6h-6M3 19v-6h6" />
          </svg>
          刷新
        </button>

        <p id="codexHome" class="path-note"></p>
      </aside>

      <main class="workspace">
        <section class="list-pane" aria-label="会话列表">
          <div class="pane-header">
            <div>
              <h2>会话</h2>
              <p id="listSubtitle">正在加载</p>
            </div>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>

        <section class="detail-pane" aria-label="会话详情">
          <div id="emptyState" class="empty-state">
            <div class="empty-icon">⌁</div>
            <h2>选择一个会话</h2>
            <p>预览消息、导出 Markdown，或管理归档状态。</p>
          </div>

          <article id="detailView" class="detail-view is-hidden">
            <header class="detail-header">
              <div>
                <div class="source-pill" id="detailSource">sessions</div>
                <h2 id="detailTitle"></h2>
                <p id="detailMeta"></p>
              </div>
              <div class="action-bar">
                <button id="exportButton" class="icon-button" type="button" title="导出 Markdown">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <path d="M7 10l5 5 5-5" />
                    <path d="M12 15V3" />
                  </svg>
                </button>
                <button id="archiveButton" class="icon-button" type="button" title="归档">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 8v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8" />
                    <path d="M3 8l2-5h14l2 5" />
                    <path d="M10 12h4" />
                  </svg>
                </button>
                <button id="recoverButton" class="icon-button" type="button" title="恢复">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 7v6h6" />
                    <path d="M21 17a9 9 0 0 0-15-6.7L3 13" />
                  </svg>
                </button>
                <button id="deleteButton" class="icon-button danger" type="button" title="删除">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 6h18" />
                    <path d="M8 6V4h8v2" />
                    <path d="M19 6l-1 14H6L5 6" />
                    <path d="M10 11v5" />
                    <path d="M14 11v5" />
                  </svg>
                </button>
              </div>
            </header>

            <div class="detail-file" id="detailFile"></div>
            <div id="messageList" class="message-list"></div>
          </article>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
